<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>王真 &amp; 陈雨欣 · 婚礼邀请函</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #FAF8F5;
      --warm-white: #FFFDF9;
      --charcoal: #2A2825;
      --taupe: #B5A99E;
      --taupe-light: #D4C9BE;
      --rose: #C0978F;
      --gold: #C4A96E;
      --gold-light: #E8D9B8;
      --sage: #8B9E8B;
      --text-secondary: #8A8480;
      --divider: rgba(181,169,158,0.35);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background-color: var(--cream);
      color: var(--charcoal);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.03em;
      line-height: 1.8;
      overflow-x: hidden;
    }

    ::selection {
      background: var(--gold-light);
      color: var(--charcoal);
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--taupe); border-radius: 2px; }

    /* ─── Utility ─── */
    .section-reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .section-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── Navigation dots ─── */
    .nav-dots {
      position: fixed;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }
    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--taupe);
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      opacity: 0.5;
    }
    .nav-dot.active {
      opacity: 1;
      background: var(--gold);
      transform: scale(1.4);
    }
    .nav-dot:hover { opacity: 1; }

    /* ─── Music Toggle ─── */
    .music-toggle {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 200;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--divider);
      background: rgba(250,248,245,0.85);
      backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      color: var(--taupe);
    }
    .music-toggle:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .music-toggle svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 40px 24px;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    /* Botanical SVG watermark */
    .botanical-watermark {
      position: absolute;
      opacity: 0.06;
      fill: var(--taupe);
    }
    .botanical-watermark.top-right {
      top: -40px;
      right: -40px;
      width: 420px;
      height: 420px;
      transform: rotate(15deg);
    }
    .botanical-watermark.bottom-left {
      bottom: -60px;
      left: -60px;
      width: 340px;
      height: 340px;
      transform: rotate(-20deg);
    }

    /* Horizontal lines */
    .hero-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--divider);
    }
    .hero-line.top { top: 60px; }
    .hero-line.bottom { bottom: 60px; }

    .hero-ornament {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .hero-ornament.top { top: 54px; left: 50%; transform: translateX(-50%); }
    .hero-ornament.bottom { bottom: 54px; left: 50%; transform: translateX(-50%); }
    .ornament-line { width: 1px; height: 24px; background: var(--divider); }
    .ornament-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }

    .hero-content {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .hero-eyebrow {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(0.65rem, 1.5vw, 0.75rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 9vw, 7rem);
      line-height: 1.05;
      color: var(--charcoal);
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
    }

    .hero-ampersand {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: var(--taupe);
      display: block;
      margin: 10px 0 14px;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
    }

    .hero-date {
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(0.7rem, 1.8vw, 0.85rem);
      letter-spacing: 0.4em;
      color: var(--text-secondary);
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.0s forwards;
    }

    .hero-divider {
      width: 40px;
      height: 1px;
